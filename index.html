  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ═══════════════════════════════════════
       CSS — exact garden-os.css
    ═══════════════════════════════════════ */
    const CSS = `
      /* Fonts loaded via <head> — no @import needed here */
      /* ── GARDEN OS PALETTE ── */

      :root {
        --bg:#efe7d4; --sur:#f8f2e5; --sur2:#e8dec7;
        --ink:#2f291f; --ink2:#5d5345; --mut:#9a8c76;
        --ac:#5f7747; --ac2:#b9793e; --ac3:#7b9ca0;
        --acbg:rgba(95,119,71,.13);
        --bo:#cbbd9f; --bos:#a99878;
        --shadow:0 18px 46px rgba(76,60,35,.14);
        --tight:0 1px 0 rgba(255,255,255,.72) inset;
        --serif:'Libre Baskerville',Georgia,serif; --mono:'DM Mono','Courier New',monospace;
      }
      :root.dark {
        --bg:#27231d; --sur:#332e25; --sur2:#211d18;
        --ink:#efe7d4; --ink2:#d2c7b0; --mut:#9b8e78;
        --ac:#91a873; --ac2:#d0a15f; --ac3:#8db6bb;
        --acbg:rgba(145,168,115,.16);
        --bo:#544a39; --bos:#786a50;
        --shadow:0 18px 46px rgba(0,0,0,.28);
        --tight:0 1px 0 rgba(255,255,255,.08) inset;
      }

      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
      html{scroll-behavior:smooth;}
      body,#root{
        color:var(--ink);font-family:var(--serif);min-height:100vh;
        transition:background .35s,color .35s;overflow-x:hidden;
        background:
          radial-gradient(circle at 18px 18px, rgba(95,119,71,.12) 1px, transparent 1.5px) 0 0/34px 34px,
          linear-gradient(rgba(169,152,120,.16) 1px, transparent 1px) 0 0/100% 34px,
          linear-gradient(90deg, rgba(169,152,120,.12) 1px, transparent 1px) 0 0/34px 100%,
          var(--bg);
      }
      body::before{
        content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:.42;
        background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.38'/%3E%3C/svg%3E");
        mix-blend-mode:multiply;
      }
      /* Spine bookmark */
      body::after{
        content:'';position:fixed;left:18px;top:70px;bottom:18px;width:18px;z-index:-1;border-radius:12px;
        background:linear-gradient(#8c5731 0 20%,#365f48 20% 43%,#d3b774 43% 61%,#5b6f88 61% 82%,#7b503e 82%);
        box-shadow:0 0 0 1px rgba(60,47,31,.18),6px 0 18px rgba(62,45,24,.12);
        opacity:.55;
      }
      ::-webkit-scrollbar{width:10px;}
      ::-webkit-scrollbar-track{background:var(--sur2);}
      ::-webkit-scrollbar-thumb{background:var(--bos);border:3px solid var(--sur2);border-radius:12px;}

      /* ── NAV ── */
      .nav{
        position:sticky;top:0;z-index:100;
        display:grid;grid-template-columns:220px 1fr auto;
        align-items:center;gap:22px;min-height:54px;padding:7px 16px;
        background:rgba(248,242,229,.88);backdrop-filter:blur(14px);
        border-bottom:1px solid var(--bo);
        box-shadow:0 8px 28px rgba(75,59,34,.08);
        transition:background .35s,border-color .35s;
      }
      :root.dark .nav{background:rgba(51,46,37,.9);}
      .nav-name{
        display:inline-flex;align-items:center;gap:8px;width:max-content;
        font-family:var(--mono);font-size:12px;font-weight:500;color:var(--ink);
        letter-spacing:0;background:var(--sur);border:1px solid var(--bo);
        border-radius:7px;padding:8px 11px;box-shadow:var(--tight);
      }
      .nav-name::before{
        content:'';width:9px;height:9px;border-radius:50%;background:var(--ac);
        box-shadow:14px 0 0 var(--ac2),28px 0 0 var(--ac3);margin-right:26px;
      }
      .nav-name span{color:var(--ac);}
      .nav-links{
        justify-self:center;display:flex;gap:5px;
        background:var(--sur);border:1px solid var(--bo);
        border-radius:8px;padding:4px;box-shadow:var(--tight);
      }
      .nav-links a{
        font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:none;
        color:var(--ink2);text-decoration:none;transition:all .2s;
        position:relative;padding:6px 10px;border-radius:6px;
      }
      .nav-links a:hover{color:var(--ink);background:var(--acbg);}
      .nav-controls{display:flex;gap:6px;justify-self:end;}
      .ctrl{
        font-family:var(--mono);font-size:10px;letter-spacing:0;text-transform:none;
        padding:7px 10px;background:var(--sur);border:1px solid var(--bo);
        border-radius:7px;color:var(--ink2);cursor:pointer;
        transition:all .2s;user-select:none;box-shadow:var(--tight);
      }
      .ctrl:hover{border-color:var(--bos);color:var(--ink);transform:translateY(-1px);}
      .ctrl.on{background:var(--ac);color:#fff8ea;border-color:var(--ac);}

      /* ── HERO ── */
      .hero{
        min-height:calc(100vh - 54px);
        display:flex;flex-direction:column;justify-content:center;
        padding:76px 56px 56px 70px;
        border-bottom:1px solid var(--bo);
        position:relative;overflow:hidden;
      }
      /* Garden OS Demo label */
      .hero::before{
        content:'Garden OS Demo';position:absolute;top:22px;left:70px;
        font-family:var(--mono);font-size:10px;color:var(--mut);
        background:var(--sur);border:1px solid var(--bo);
        border-radius:6px;padding:6px 9px;box-shadow:var(--tight);
      }
      /* Sage sticky note */
      .hero::after{
        content:'Sage';position:absolute;right:76px;top:104px;
        width:128px;height:86px;padding:12px 14px;
        border:1px solid var(--bo);border-radius:5px;
        background:#dfe7cf;color:var(--ac);
        font-family:var(--mono);font-size:11px;
        box-shadow:var(--shadow);transform:rotate(2deg);
      }
      .hero-grain{
        position:absolute;inset:0;pointer-events:none;opacity:.16;
        background:radial-gradient(circle at 50% 50%,transparent 0 44%,rgba(95,119,71,.22) 45%,transparent 46%);
        background-size:260px 260px;
      }

      .avail{
        display:inline-flex;align-items:center;gap:7px;width:max-content;
        font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:none;
        color:var(--ac);margin-bottom:18px;
        background:var(--sur);border:1px solid var(--bo);
        border-radius:999px;padding:7px 11px;box-shadow:var(--tight);
      }
      .avail-dot{width:7px;height:7px;border-radius:50%;background:var(--ac);animation:pr 2s ease-in-out infinite;flex-shrink:0;}
      @keyframes pr{0%,100%{box-shadow:0 0 0 0 rgba(95,119,71,.45);}50%{box-shadow:0 0 0 6px rgba(95,119,71,0);}}
      :root.dark .avail-dot{animation-name:prd;}
      @keyframes prd{0%,100%{box-shadow:0 0 0 0 rgba(145,168,115,.48);}50%{box-shadow:0 0 0 6px rgba(145,168,115,0);}}

      .hero-overline{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:none;color:var(--ac2);margin-bottom:18px;}
      .hero-name{
        max-width:590px;font-size:clamp(48px,7.2vw,92px);font-weight:700;
        line-height:1.02;letter-spacing:0;color:var(--ink);margin-bottom:26px;
        text-shadow:0 1px 0 rgba(255,255,255,.55);
      }
      .hero-name em{font-style:italic;color:var(--ac);}
      .hero-desc{
        font-size:15px;color:var(--ink2);max-width:520px;line-height:1.86;
        margin-bottom:30px;background:rgba(248,242,229,.78);
        border:1px solid var(--bo);border-radius:7px;padding:20px 22px;
        box-shadow:var(--shadow),var(--tight);
      }
      :root.dark .hero-desc{background:rgba(51,46,37,.82);}
      .hero-desc strong{color:var(--ink);font-weight:700;}
      .hero-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
      .hero-loc{
        font-family:var(--mono);font-size:10px;color:var(--mut);margin-left:4px;
        background:var(--sur);border:1px dashed var(--bos);
        border-radius:6px;padding:8px 10px;
      }

      /* ── DRAGGABLE WIDGETS ── */
      .hero-widgets{position:absolute;inset:0;pointer-events:none;z-index:6;}
      .dwidget{
        position:absolute;pointer-events:all;
        background:rgba(248,242,229,.93);
        border:1px solid var(--bo);border-radius:9px;
        box-shadow:var(--shadow),var(--tight);
        overflow:hidden;backdrop-filter:blur(12px);
        user-select:none;transition:box-shadow .15s;min-width:200px;
      }
      :root.dark .dwidget{background:rgba(51,46,37,.93);}
      .dwidget.dragging{
        box-shadow:0 32px 64px rgba(76,60,35,.3),var(--tight);
        z-index:20;cursor:grabbing;
      }
      .dwidget-bar{
        display:flex;align-items:center;gap:8px;
        padding:8px 11px;border-bottom:1px solid var(--bo);
        background:rgba(232,222,199,.5);cursor:grab;
        font-family:var(--mono);font-size:9px;color:var(--mut);letter-spacing:.06em;
      }
      :root.dark .dwidget-bar{background:rgba(33,29,24,.5);}
      .dwidget-dots{display:flex;gap:5px;flex-shrink:0;}
      .dwidget-dot{width:8px;height:8px;border-radius:50%;}
      .dwidget-dot.r{background:#c06060;opacity:.75;}
      .dwidget-dot.y{background:#b89040;opacity:.75;}
      .dwidget-dot.g{background:var(--ac);opacity:.75;}
      .dwidget-body{padding:12px;}
      .status-row{
        display:flex;align-items:center;justify-content:space-between;gap:14px;
        padding:7px 0;border-bottom:1px dashed rgba(169,152,120,.45);
        font-family:var(--mono);font-size:9px;color:var(--ink2);
      }
      .status-row:last-child{border-bottom:0;}
      .status-row strong{font-weight:500;color:var(--ink);}
      .mini-pills{display:flex;flex-wrap:wrap;gap:5px;}
      .mini-pill{
        font-family:var(--mono);font-size:9px;color:var(--ink2);
        background:var(--sur2);border:1px solid var(--bo);
        border-radius:999px;padding:3px 7px;
      }
      .mini-map{
        height:84px;border:1px solid var(--bo);border-radius:7px;margin-top:8px;
        background:
          radial-gradient(circle at 28% 38%,rgba(95,119,71,.26) 0 15%,transparent 16%),
          radial-gradient(circle at 58% 32%,rgba(123,156,160,.24) 0 13%,transparent 14%),
          radial-gradient(circle at 72% 68%,rgba(185,121,62,.18) 0 15%,transparent 16%),
          #eee4cf;
      }
      :root.dark .mini-map{background:#27231d;}

      /* ── BUTTONS ── */
      .btn-fill,.btn-line{
        font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:none;
        border-radius:7px;cursor:pointer;text-decoration:none;
        display:inline-block;transition:all .2s;box-shadow:var(--tight);
      }
      .btn-fill{padding:11px 18px;background:var(--ac);color:#fff8ea;border:1px solid rgba(47,41,31,.16);position:relative;overflow:hidden;}
      .btn-fill::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.14);transform:translateX(-101%);transition:transform .3s;}
      .btn-fill:hover::after{transform:translateX(0);}
      .btn-fill:hover,.btn-line:hover{transform:translateY(-2px);}
      .btn-line{padding:10px 16px;background:var(--sur);color:var(--ink2);border:1px solid var(--bo);}
      .btn-line:hover{border-color:var(--bos);color:var(--ink);background:var(--acbg);}

      /* ── CV DROPDOWN ── */
      .cv-wrap{position:relative;display:inline-block;}
      .cv-menu{
        position:absolute;top:calc(100% + 7px);left:0;
        background:var(--sur);border:1px solid var(--bo);
        border-radius:8px;min-width:166px;z-index:200;
        display:flex;flex-direction:column;box-shadow:var(--shadow);
      }
      .cv-opt{
        font-family:var(--mono);font-size:10px;letter-spacing:.02em;text-transform:none;
        padding:10px 13px;color:var(--ink2);text-decoration:none;
        display:flex;align-items:center;gap:8px;
        transition:background .15s,color .15s;
        border:none;background:transparent;cursor:pointer;width:100%;text-align:left;
      }
      .cv-opt:hover{background:var(--acbg);color:var(--ac);}

      /* ── SECTIONS ── */
      .section{
        margin:18px 20px 18px 52px;padding:34px 34px 38px;
        border:1px solid var(--bo);border-radius:9px;
        background:rgba(248,242,229,.78);
        box-shadow:var(--shadow),var(--tight);position:relative;
      }
      :root.dark .section{background:rgba(51,46,37,.82);}
      .section::before{
        content:'';position:absolute;top:12px;left:14px;right:14px;
        height:1px;background:linear-gradient(90deg,var(--bo),transparent);
      }
      .section.alt{background:rgba(232,222,199,.78);}
      :root.dark .section.alt{background:rgba(33,29,24,.82);}
      .sec-hdr{display:flex;align-items:center;gap:14px;margin-bottom:30px;}
      .sec-num{
        font-family:var(--mono);font-size:10px;color:var(--mut);letter-spacing:.02em;
        background:var(--sur);border:1px solid var(--bo);
        border-radius:6px;padding:5px 7px;flex-shrink:0;
      }
      .sec-title{font-size:clamp(26px,3.4vw,42px);font-weight:700;letter-spacing:0;line-height:1;color:var(--ink);}
      .module-tabs{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
      .module-tab{
        font-family:var(--mono);font-size:9px;color:var(--ink2);
        background:var(--sur);border:1px solid var(--bo);
        border-radius:999px;padding:5px 8px;box-shadow:var(--tight);
      }
      .module-tab.live{color:#fff8ea;background:var(--ac);border-color:var(--ac);}

      /* ── ABOUT ── */
      .about-grid{display:grid;grid-template-columns:3fr 2fr;gap:28px;}
      .about-body{background:var(--sur);border:1px solid var(--bo);border-radius:8px;padding:22px;box-shadow:var(--tight);}
      .about-body p{color:var(--ink2);margin-bottom:16px;font-size:14px;line-height:1.82;}
      .about-body p:last-child{margin-bottom:0;}
      .about-body p strong{color:var(--ink);font-weight:700;}
      .fact{
        display:flex;justify-content:space-between;align-items:baseline;gap:18px;
        padding:12px 13px;border:1px solid var(--bo);border-bottom:none;
        background:var(--sur);box-shadow:var(--tight);
      }
      .fact:first-child{border-top-left-radius:8px;border-top-right-radius:8px;}
      .fact:last-child{border-bottom:1px solid var(--bo);border-bottom-left-radius:8px;border-bottom-right-radius:8px;}
      .fact-label{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:none;color:var(--mut);}
      .fact-value{font-family:var(--mono);font-size:12px;color:var(--ink);font-weight:500;text-align:right;}

      /* Profile card inside about */
      .profile-card{background:var(--sur);border:1px solid var(--bo);border-radius:8px;padding:18px;margin-bottom:12px;box-shadow:var(--tight);}
      .profile-card-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
      .profile-mark{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:#dfe7cf;border:1px solid var(--bo);font-family:var(--mono);font-size:13px;color:var(--ac);font-weight:500;}
      .profile-role{font-family:var(--mono);font-size:10px;color:var(--mut);margin-bottom:3px;}
      .profile-name{font-size:17px;font-weight:700;color:var(--ink);}
      .profile-focus{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
      .focus-cell{border:1px solid var(--bo);border-radius:7px;background:var(--sur2);padding:9px 8px;font-family:var(--mono);font-size:9px;color:var(--ink2);text-align:center;}
      .focus-cell strong{display:block;color:var(--ac);font-size:11px;margin-bottom:3px;}
      .stack-note,.trait-strip{margin:10px 0 22px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;color:var(--ink2);}
      .stack-note span,.trait-strip span{background:var(--sur);border:1px solid var(--bo);border-radius:7px;padding:6px 9px;box-shadow:var(--tight);}

      /* ── SKILLS ── */
      .skill-group{
        display:grid;grid-template-columns:160px 1fr;gap:22px;
        padding:16px;margin-bottom:10px;
        border:1px solid var(--bo);border-radius:8px;
        background:var(--sur);box-shadow:var(--tight);
      }
      .sg-label{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:none;color:var(--ac);padding-top:12px;}
      .sg-tags{display:flex;flex-wrap:wrap;gap:8px;}
      .sg-tag{
        display:inline-flex;flex-direction:column;align-items:center;gap:8px;
        padding:12px 13px 11px;background:#f1ead8;border:1px solid var(--bo);
        border-radius:7px;font-family:var(--mono);font-size:10px;color:var(--ink2);
        cursor:default;transition:all .22s;user-select:none;
        min-width:82px;text-align:center;box-shadow:var(--tight);
      }
      :root.dark .sg-tag{background:#28231c;}
      .sg-tag:hover{border-color:var(--ac);color:var(--ac);background:var(--acbg);transform:translateY(-3px) rotate(-.4deg);}
      .sg-tag.main{background:#dfe7cf;border-color:var(--ac);color:var(--ac);font-weight:500;}
      :root.dark .sg-tag.main{background:rgba(145,168,115,.18);}
      .sg-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;opacity:.62;transition:opacity .22s;flex-shrink:0;}
      .sg-tag:hover .sg-icon,.sg-tag.main .sg-icon{opacity:1;}
      .sg-icon svg{width:23px;height:23px;}

      /* ── SOFT SKILLS ── */
      .soft-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
      .soft-card{
        background:var(--sur);border:1px solid var(--bo);border-radius:8px;
        padding:24px 22px;transition:border-color .25s,transform .25s,box-shadow .25s;
        position:relative;overflow:hidden;box-shadow:var(--tight);
      }
      .soft-card::before{content:'';position:absolute;top:12px;right:14px;width:46px;height:58px;border:1px solid rgba(95,119,71,.25);border-radius:50% 50% 45% 45%;opacity:.34;}
      .soft-card:hover{border-color:var(--ac);transform:translateY(-4px) rotate(-.35deg);box-shadow:var(--shadow);}
      .soft-icon{font-size:28px;margin-bottom:14px;display:block;line-height:1;}
      .soft-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:8px;letter-spacing:0;}
      .soft-desc{font-size:13px;color:var(--ink2);line-height:1.72;}
      .soft-example{display:inline-block;margin-top:14px;font-family:var(--mono);font-size:10px;letter-spacing:.03em;text-transform:none;color:var(--ac2);border-bottom:1px solid rgba(185,121,62,.45);padding-bottom:2px;}

      /* ── PROJECTS ── */
      .proj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;}
      .proj-card{
        background:var(--sur);border:1px solid var(--bo);border-radius:9px;
        transition:border-color .25s,transform .25s,box-shadow .25s;
        overflow:hidden;box-shadow:var(--tight);position:relative;
      }
      .proj-card::after{content:'';position:absolute;top:12px;right:12px;width:10px;height:10px;border-radius:50%;background:var(--ac2);box-shadow:0 0 0 4px rgba(185,121,62,.12);}
      .proj-card:nth-child(2)::after{background:var(--ac3);box-shadow:0 0 0 4px rgba(123,156,160,.13);}
      .proj-card:nth-child(3)::after{background:var(--ac);box-shadow:0 0 0 4px rgba(95,119,71,.13);}
      .proj-card:hover{border-color:var(--ac);transform:translateY(-5px) rotate(.25deg);box-shadow:var(--shadow);}

      /* Slider */
      .slider-wrap{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--sur2);border-bottom:1px solid var(--bo);}
      .slider-track{display:flex;height:100%;transition:transform .45s cubic-bezier(.4,0,.2,1);will-change:transform;}
      .slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;position:relative;}
      .slide::before{content:'';position:absolute;inset:16px;border:1px dashed rgba(255,255,255,.28);border-radius:50%;}
      .slider-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:6px;z-index:2;}
      .dot{width:6px;height:6px;border-radius:50%;background:var(--mut);opacity:.42;transition:opacity .2s,transform .2s;cursor:pointer;border:none;padding:0;}
      .dot.active{opacity:1;background:var(--ac);transform:scale(1.25);}
      .sarr{position:absolute;top:50%;transform:translateY(-50%);z-index:2;background:var(--sur);border:1px solid var(--bo);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--ink2);transition:all .2s;opacity:0;box-shadow:var(--tight);}
      .slider-wrap:hover .sarr{opacity:1;}
      .sarr:hover{background:var(--ac);color:#fff8ea;border-color:var(--ac);}
      .sarr.l{left:8px;} .sarr.r{right:8px;}
      .card-body{padding:23px 24px 25px;}
      .card-num{font-family:var(--mono);font-size:10px;color:var(--mut);letter-spacing:.04em;margin-bottom:8px;}
      .card-title{font-size:19px;font-weight:700;color:var(--ink);margin-bottom:5px;letter-spacing:0;}
      .card-sub{font-family:var(--mono);font-size:10px;color:var(--ac);letter-spacing:.04em;margin-bottom:12px;}
      .project-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:13px;}
      .project-status,.project-focus{font-family:var(--mono);font-size:9px;border:1px solid var(--bo);border-radius:999px;padding:4px 7px;background:var(--sur2);color:var(--ink2);}
      .project-status{color:#fff8ea;background:var(--ac);border-color:var(--ac);}
      .card-desc{font-size:13px;color:var(--ink2);line-height:1.72;margin-bottom:16px;}
      .card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:19px;}
      .card-tag{font-family:var(--mono);font-size:9px;letter-spacing:.04em;text-transform:none;color:var(--ink2);padding:3px 7px;border:1px solid var(--bo);border-radius:999px;background:rgba(255,255,255,.24);}
      .card-links{display:flex;gap:10px;}
      .card-link{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:none;color:var(--ink2);text-decoration:none;padding:6px 12px;border:1px solid var(--bo);border-radius:7px;transition:all .2s;display:inline-flex;align-items:center;gap:4px;background:var(--sur2);}
      .card-link:hover{color:var(--ac);border-color:var(--ac);background:var(--acbg);}

      /* ── CONTACT ── */
      .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;}
      .contact-grid>div{background:var(--sur);border:1px solid var(--bo);border-radius:8px;padding:22px;box-shadow:var(--tight);}
      .contact-note{display:flex;align-items:center;gap:10px;margin-bottom:16px;font-family:var(--mono);font-size:10px;color:var(--ac);}
      .contact-note::before{content:'';width:10px;height:10px;border-radius:50%;background:var(--ac);box-shadow:0 0 0 4px var(--acbg);}
      .ci{font-size:14px;color:var(--ink2);line-height:1.82;margin-bottom:18px;}
      .c-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 0;border-bottom:1px solid var(--bo);text-decoration:none;transition:all .2s;}
      .c-row:hover .c-val{color:var(--ac);}
      .c-label{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:none;color:var(--mut);}
      .c-val{font-family:var(--mono);font-size:12px;color:var(--ink2);transition:color .2s;text-align:right;}

      /* ── FOOTER ── */
      footer{
        margin:18px 20px 18px 52px;padding:18px 22px;
        display:flex;justify-content:space-between;align-items:center;
        background:var(--sur);border:1px solid var(--bo);
        border-radius:9px;box-shadow:var(--tight);
      }
      footer span{font-family:var(--mono);font-size:10px;color:var(--mut);letter-spacing:.03em;}
      .fac{color:var(--ac);}

      /* ── ANIMATIONS ── */
      @keyframes fi{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}
      .fi{animation:fi .55s ease both;}
      .fi1{animation-delay:.08s;} .fi2{animation-delay:.16s;} .fi3{animation-delay:.24s;} .fi4{animation-delay:.32s;}
      .reveal{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease;}
      .reveal.in{opacity:1;transform:none;}
      @keyframes eggdot{from{transform:scale(1) translateY(0);}to{transform:scale(1.4) translateY(-6px);}}

      /* ── RESPONSIVE ── */
      @media(max-width:980px){
        .nav{grid-template-columns:1fr auto;padding:7px 12px;}
        .nav-links{display:none;}
        .hero{padding:54px 20px 42px 30px;}
        .hero::before{left:30px;}
        .hero::after{display:none;}
        .hero-windows{position:relative;right:auto;bottom:auto;width:100%;margin-top:24px;grid-template-columns:1fr 1fr;}
        .section,footer{margin-left:20px;}
        .about-grid,.contact-grid{grid-template-columns:1fr;gap:18px;}
        .skill-group{grid-template-columns:1fr;gap:12px;}
      }
      /* ── GAME JAM BADGE ── */
      .jam-badge{
        display:inline-flex;align-items:center;gap:5px;
        font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;
        padding:3px 8px;border-radius:999px;
        background:var(--ac2);color:#fff8ea;
        border:1px solid rgba(255,255,255,.2);
        box-shadow:0 2px 8px rgba(185,121,62,.3);
        vertical-align:middle;margin-left:6px;
      }

      /* ── HERO CAROUSEL ── */
      .hero-carousel{
        position:absolute;right:0;top:0;bottom:0;
        width:min(52%,620px);
        overflow:hidden;
        display:flex;flex-direction:column;
      }
      .hc-track{
        display:flex;height:100%;
        transition:transform .6s cubic-bezier(.4,0,.2,1);
        will-change:transform;
      }
      .hc-slide{
        min-width:100%;height:100%;
        position:relative;overflow:hidden;flex-shrink:0;
      }
      .hc-slide img{
        width:100%;height:100%;object-fit:cover;
        display:block;
      }
      /* gradient fade left so text is always readable */
      .hc-slide::before{
        content:'';
        position:absolute;inset:0;z-index:1;
        background:linear-gradient(90deg,var(--bg) 0%,rgba(239,231,212,.7) 22%,transparent 55%);
        pointer-events:none;
      }
      :root.dark .hc-slide::before{
        background:linear-gradient(90deg,var(--bg) 0%,rgba(39,35,29,.7) 22%,transparent 55%);
      }
      /* pill overlay bottom-right */
      .hc-info{
        position:absolute;bottom:20px;right:20px;z-index:2;
        display:flex;flex-direction:column;align-items:flex-end;gap:6px;
      }
      .hc-title-pill{
        font-family:var(--mono);font-size:10px;letter-spacing:.06em;
        padding:6px 10px;border-radius:6px;
        background:rgba(248,242,229,.88);color:var(--ink);
        border:1px solid var(--bo);box-shadow:var(--shadow);
        backdrop-filter:blur(8px);
      }
      :root.dark .hc-title-pill{background:rgba(51,46,37,.88);}
      .hc-label-pill{
        font-family:var(--mono);font-size:9px;letter-spacing:.1em;
        text-transform:uppercase;padding:3px 8px;border-radius:999px;
        background:var(--ac);color:#fff8ea;
        box-shadow:0 2px 8px rgba(95,119,71,.35);
      }
      /* placeholder slide (no img) */
      .hc-placeholder{
        width:100%;height:100%;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        gap:14px;font-family:var(--mono);
        background:var(--sur2);
      }
      .hc-placeholder-icon{font-size:48px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.2));}
      .hc-placeholder-label{
        font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);
      }
      /* controls */
      .hc-controls{
        position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
        z-index:3;display:flex;align-items:center;gap:8px;
      }
      .hc-dot{
        width:6px;height:6px;border-radius:50%;
        background:var(--bo);border:none;cursor:pointer;padding:0;
        transition:all .2s;
      }
      .hc-dot.on{background:var(--ac);transform:scale(1.4);}
      .hc-arrow{
        position:absolute;top:50%;transform:translateY(-50%);
        z-index:3;background:rgba(248,242,229,.82);
        border:1px solid var(--bo);border-radius:50%;
        width:34px;height:34px;
        display:flex;align-items:center;justify-content:center;
        cursor:pointer;font-size:16px;color:var(--ink2);
        transition:all .2s;backdrop-filter:blur(8px);
        box-shadow:var(--shadow);
      }
      :root.dark .hc-arrow{background:rgba(51,46,37,.82);}
      .hc-arrow:hover{background:var(--ac);color:#fff8ea;border-color:var(--ac);}
      .hc-arrow.l{left:14px;} .hc-arrow.r{right:14px;}
      /* thumbnail strip */
      .hc-thumbs{
        position:absolute;right:12px;top:50%;transform:translateY(-50%);
        z-index:3;display:flex;flex-direction:column;gap:6px;
      }
      .hc-thumb{
        width:44px;height:32px;border-radius:4px;
        border:2px solid transparent;
        overflow:hidden;cursor:pointer;
        transition:border-color .2s,transform .2s;
        background:var(--sur2);
        opacity:.55;
      }
      .hc-thumb.on{border-color:var(--ac);opacity:1;transform:scale(1.08);}
      .hc-thumb:hover{opacity:.85;}
      .hc-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
      .hc-thumb-icon{
        width:100%;height:100%;
        display:flex;align-items:center;justify-content:center;
        font-size:16px;
      }

      /* Make hero layout work with carousel */
      .hero{
        position:relative;
        overflow:hidden;
      }
      .hero-left{
        position:relative;z-index:2;
        max-width:min(56%,640px);
      }

      @media(max-width:980px){
        .hero-carousel{display:none;}
        .hero-left{max-width:100%;}
      }
    `;

    /* ═══════════════════════════════════════
       DRAGGABLE WIDGET WITH DROP DETECTION
    ═══════════════════════════════════════ */
    function DraggableWidget({ widgetKey, title, children, defaultPos, style={}, onDrop }) {
      const [pos, setPos] = useState(defaultPos);
      const [dragging, setDragging] = useState(false);
      const [landed, setLanded] = useState(false);
      const offset = useRef({x:0,y:0});
      const ref = useRef(null);

      const onDown = e => {
        e.preventDefault();
        setDragging(true);
        setLanded(false);
        const cl = e.touches ? e.touches[0] : e;
        offset.current = { x: cl.clientX - pos.x, y: cl.clientY - pos.y };
      };

      useEffect(() => {
        if (!dragging) return;
        const onMove = e => {
          const cl = e.touches ? e.touches[0] : e;
          const hero = ref.current?.closest('.hero');
          if (!hero) return;
          const rect = hero.getBoundingClientRect();
          const ww = ref.current?.offsetWidth || 200;
          const wh = ref.current?.offsetHeight || 100;
          setPos({
            x: Math.min(Math.max(0, cl.clientX - offset.current.x - rect.left), rect.width - ww),
            y: Math.min(Math.max(0, cl.clientY - offset.current.y - rect.top),  rect.height - wh),
          });
        };
        const onUp = e => {
          setDragging(false);
          if (!ref.current) return;
          // Find this widget's drop zone by data-key
          const zone = document.querySelector(`.drop-zone[data-key="${widgetKey}"]`);
          if (!zone) return;
          const wRect = ref.current.getBoundingClientRect();
          const zRect = zone.getBoundingClientRect();
          // Check if widget center overlaps with zone
          const cx = wRect.left + wRect.width  / 2;
          const cy = wRect.top  + wRect.height / 2;
          const inside =
            cx >= zRect.left && cx <= zRect.right &&
            cy >= zRect.top  && cy <= zRect.bottom;
          setLanded(inside);
          onDrop(widgetKey, inside);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup',   onUp);
        window.addEventListener('touchmove', onMove, {passive:false});
        window.addEventListener('touchend',  onUp);
        return () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup',   onUp);
          window.removeEventListener('touchmove', onMove);
          window.removeEventListener('touchend',  onUp);
        };
      }, [dragging]);

      return (
        <div
          ref={ref}
          className={`dwidget${dragging?' dragging':''}${landed?' landed':''}`}
          style={{
            left: pos.x, top: pos.y,
            outline: landed ? '2px solid var(--ac)' : 'none',
            ...style,
          }}
        >
          <div className="dwidget-bar" onMouseDown={onDown} onTouchStart={onDown}>
            <div className="dwidget-dots">
              <div className="dwidget-dot r"/>
              <div className="dwidget-dot y"/>
              <div className="dwidget-dot g"/>
            </div>
            {title}
            {landed && <span style={{marginLeft:'auto',color:'var(--ac)',fontSize:9}}>✓</span>}
          </div>
          <div className="dwidget-body">{children}</div>
        </div>
      );
    }

        const fn=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
        document.addEventListener("mousedown",fn);
        return()=>document.removeEventListener("mousedown",fn);
      },[]);
      return(
        <div className="cv-wrap" ref={ref}>
          <button className="btn-line" onClick={()=>setOpen(o=>!o)}>↓ {lang==="es"?"Descargar CV":lang==="pt"?"Baixar CV":"Download CV"} ▾</button>

            </div>
          )}
        </div>
      );

    function useReveal(){
      useEffect(()=>{
        const els=document.querySelectorAll(".reveal");
        const io=new IntersectionObserver(
          entries=>entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}}),
          {threshold:.07,rootMargin:"0px 0px -28px 0px"}
        );
        els.forEach(el=>io.observe(el));
        return()=>io.disconnect();
      });
    }

    /* Hash scroll — runs once after React mounts the DOM.
       Without this, clicking a nav link on first load lands
       at the wrong position because React hasn't painted yet. */
    function useHashScroll(){
      useEffect(()=>{
        const hash = window.location.hash;
        if(!hash) return;
        // Small delay lets React finish painting all sections
        const id = setTimeout(()=>{
          const el = document.querySelector(hash);
          if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
        }, 120);
        return () => clearTimeout(id);
      }, []); // runs once on mount
    }
